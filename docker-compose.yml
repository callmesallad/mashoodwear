services:
  mysql:
    image: mysql:8.0
    container_name: mashoodwear-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mashoodwear
      MYSQL_USER: mashoodwear
      MYSQL_PASSWORD: mashoodwear_dev
    volumes:
      - mashoodwear_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mashoodwear_mysql_data:
